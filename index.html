<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dreamland voorraadchecker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background:#0f172a; color:#e5e7eb; }
    h1 { margin-bottom: 16px; }
    button { padding:10px 14px; border:none; border-radius:10px; background:#2563eb; color:#fff; cursor:pointer; }
    table { width:100%; border-collapse: collapse; margin-top:16px; background:#111827; }
    th, td { padding:12px; border-bottom:1px solid #1f2937; text-align:left; }
    th { background:#1e293b; }
    .yes { color:#22c55e; font-weight:700; }
    .no { color:#ef4444; font-weight:700; }
    .muted { color:#94a3b8; }
    a { color:#93c5fd; }
    code { background:#111827; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <h1>Dreamland voorraadchecker</h1>
  <button onclick="loadData()">Nu checken</button>
  <p class="muted">Deze pagina doet een server-side voorraadcheck via een Netlify Function.</p>

  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Status</th>
        <th>Reden</th>
        <th>Laatst gecheckt</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    async function loadData() {
      const rows = document.getElementById("rows");
      rows.innerHTML = "<tr><td colspan='4'>Bezig met checken...</td></tr>";

      try {
        const res = await fetch("/.netlify/functions/check");
        const data = await res.json();

        rows.innerHTML = "";
        for (const p of data.products || []) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>
              <div><strong>${p.name}</strong></div>
              <div><a href="${p.url}" target="_blank">${p.url}</a></div>
            </td>
            <td class="${p.inStock ? "yes" : "no"}">${p.inStock ? "OP VOORRAAD" : "GEEN VOORRAAD"}</td>
            <td>${p.reason}</td>
            <td>${p.checkedAt}</td>
          `;
          rows.appendChild(tr);
        }
      } catch (e) {
        rows.innerHTML = `<tr><td colspan="4">Fout: ${e.message}</td></tr>`;
      }
    }

    loadData();
  </script>
</body>
</html>
